name: Weekly Queue Delta

on:
  schedule:
    - cron: '0 13 * * 6'  # 1pm UTC Saturday = 7am CT
  workflow_dispatch:  # Manual trigger

permissions:
  contents: write

jobs:
  delta:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: pip install requests gridstatus pandas
      
      - name: Run queue delta tracker
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_queue_delta.py
      
      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Weekly queue delta ${{ github.event.schedule && '(auto)' || '(manual)' }}"
          file_pattern: 'data/queue_delta.json data/queue_snapshots/*.json'
