name: Gas & IOC Refresh

on:
  schedule:
    - cron: '0 12 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Fetch gas data from pipeline portals
        env:
          GEOCODIO_KEY: ${{ secrets.GEOCODIO_KEY }}
        run: python scripts/fetch_gas_data.py

      - name: Fetch IOC contract data
        continue-on-error: true
        run: python scripts/fetch_ioc_data.py

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/gas_interconnects.json data/gas_history.json data/gas_county_coords.json data/gas_hifld_points.json data/ioc_contracts.json data/corridor_pipeline_tracker.json
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "Daily gas refresh (auto)"
          git pull --rebase origin main
          git push origin main
