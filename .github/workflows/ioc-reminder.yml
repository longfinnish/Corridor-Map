name: IOC Manual Refresh Reminder

on:
  schedule:
    - cron: '0 14 3 1,4,7,10 *'
  workflow_dispatch:

permissions:
  issues: write

jobs:
  remind:
    runs-on: ubuntu-latest
    steps:
      - name: Create IOC refresh issue
        uses: actions/github-script@v7
        with:
          script: |
            const quarter = ['Q1','Q1','Q1','Q2','Q2','Q2','Q3','Q3','Q3','Q4','Q4','Q4'][new Date().getMonth()];
            const year = new Date().getFullYear();
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `IOC Quarterly Refresh — ${quarter} ${year}`,
              body: `## Quarterly IOC Refresh Due\n\nNew Index of Customers filings should be available. Export and upload to Claude for processing.\n\n### Kinder Morgan (5 pipelines — manual Excel export)\n\n1. [El Paso Natural Gas](https://pipeline2.kindermorgan.com/IndexOfCust/IOC.aspx?code=EPNG)\n2. [Tennessee Gas Pipeline](https://pipeline2.kindermorgan.com/IndexOfCust/IOC.aspx?code=TGP)\n3. [NGPL](https://pipeline2.kindermorgan.com/IndexOfCust/IOC.aspx?code=NGPL)\n4. [Southern Natural Gas](https://pipeline2.kindermorgan.com/IndexOfCust/IOC.aspx?code=SNG)\n5. [Colorado Interstate Gas](https://pipeline2.kindermorgan.com/IndexOfCust/IOC.aspx?code=CIG)\n\n**Steps:** Click each link → Index of Customers in left tree → Export to Excel → Upload all 5 files to Claude\n\n### Northern Natural Gas (manual CSV download)\n\n6. [NNG Index of Customers](https://www.northernnaturalgas.com/infopostings/Pages/IndexOfCustomers.aspx)\n7. [NNG Locations](https://www.northernnaturalgas.com/infopostings/Pages/Locations.aspx)\n\n**Steps:** Download CSV from each page → Upload to Claude\n\n### Automated (no action needed)\nThese refresh daily via GitHub Actions:\n- Panhandle Eastern, Trunkline, Florida Gas, Transwestern, Tiger, Sea Robin, Rover, Enable MRT (ET iPost)\n- Texas Eastern (Enbridge Link)\n- Southern Star (CSI API)\n\n### Not Yet Automated (future)\n- ANR Pipeline, Columbia Gas, Columbia Gulf, Northern Border — TC Energy portal (login required)\n\n---\n*Current coverage: 21 pipelines | 5,656 contracts | 1,491 expiring 2026-27 | 30.9M Dth/d (~377 GW CC equiv)*`
            });
