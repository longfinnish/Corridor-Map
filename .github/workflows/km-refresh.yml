name: KM Pipeline Refresh

on:
  schedule:
    - cron: '0 13 * * 1'  # Monday 1pm UTC (7am CT)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Fetch KM pipeline data (26 pipelines)
        run: python scripts/fetch_km_data.py

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "KM pipeline refresh ${{ github.event.schedule && '(auto)' || '(manual)' }}"
          file_pattern: 'data/gas_interconnects.json data/corridor_pipeline_tracker.json data/gas_county_coords.json'
