name: KM Pipeline Refresh

on:
  schedule:
    - cron: '0 13 * * 1'  # Monday 1pm UTC (7am CT)
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests openpyxl

      - name: Fetch KM pipeline data (26 pipelines)
        run: python scripts/fetch_km_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "KM pipeline refresh (auto)"
          git pull --rebase origin main
          git push origin main
