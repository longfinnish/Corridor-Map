name: BBT/Quorum Pipeline Refresh

on:
  schedule:
    - cron: '0 17 * * 1'  # Monday 5pm UTC (11am CT), after Williams refresh
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch BBT/Quorum pipeline data
        run: python scripts/fetch_bbt_data.py

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "BBT/Quorum refresh ${{ github.event.schedule && '(auto)' || '(manual)' }}"
          file_pattern: 'data/gas_interconnects.json data/corridor_pipeline_tracker.json data/gas_county_coords.json'
