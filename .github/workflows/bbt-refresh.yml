name: BBT/Quorum Pipeline Refresh

on:
  schedule:
    - cron: '0 17 * * 1'  # Monday 5pm UTC (11am CT), after Williams refresh
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Pull latest
        run: git pull origin main

      - name: Fetch BBT/Quorum pipeline data
        run: python scripts/fetch_bbt_data.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "BBT/Quorum pipeline refresh (auto)"

          # Retry push up to 3 times with pull-and-rerun on conflict
          for attempt in 1 2 3; do
            if git push origin main; then
              echo "Push succeeded on attempt $attempt"
              exit 0
            fi
            echo "Push failed (attempt $attempt), pulling and re-running..."
            git reset --soft HEAD~1
            git stash
            git pull origin main
            git stash pop || true
            git add -A data/
            git diff --cached --quiet && echo "No changes after merge" && exit 0
            git commit -m "BBT/Quorum pipeline refresh (auto)"
          done
          echo "Failed after 3 attempts"
          exit 1
