name: TC Energy eConnects Refresh

on:
  schedule:
    - cron: '0 20 * * 1'  # Monday 8pm UTC (2pm CT), after EQT refresh
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Fetch TC Energy IOC + Locations
        run: python scripts/fetch_tce_data.py

      - name: Fetch TC Energy OAC + Unsub
        run: python scripts/fetch_tce_oac_unsub.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A data/
          git diff --cached --quiet && echo "No changes to commit" && exit 0
          git commit -m "TC Energy pipeline refresh (auto)"
          git pull --rebase origin main
          git push origin main
